<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login | Sortiq Solutions Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body class="auth-page">
    <div class="auth-shell">
        <div class="auth-card">
            <div class="auth-brand">
                <img
                    src="https://staging.sortiqsolutions.com/frontend-assets/media/admin-use.png"
                    alt="Sortiq Solutions"
                    width="185"
                    height="77"
                    class="auth-logo"
                >
                <span class="auth-eyebrow">Admin Panel</span>
                <h1>Sign in to the admin panel</h1>
                <p>Use your admin email and password to open the Sortiq dashboard.</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="auth-error-box" style="margin-bottom: 20px; padding: 12px; background: rgba(220, 38, 38, 0.15); border: 1px solid rgba(220, 38, 38, 0.3); border-radius: var(--r-sm); font-size: 13px; color: #fca5a5;">
                        {% for category, message in messages %}
                            <div class="auth-error-msg" style="display: flex; align-items: center; gap: 8px;">
                                <i class="fa-solid fa-circle-exclamation"></i>
                                <span>{{ message }}</span>
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="post" action="{{ url_for('admin_login') }}" class="auth-form">
                <label>
                    <span>Email Address</span>
                    <input
                        type="email"
                        name="email"
                        placeholder="Enter admin email"
                        required
                        autofocus
                    >
                </label>

                <label>
                    <span>Password</span>
                    <input
                        type="password"
                        name="password"
                        placeholder="Enter password"
                        required
                    >
                </label>

                <label class="auth-checkbox">
                    <input type="checkbox" name="remember" value="1">
                    <span>Keep me signed in</span>
                </label>

                <button type="submit" class="primary-btn auth-submit">Login</button>
            </form>

            <div style="text-align: center; margin-top: 24px;">
                <a href="/" style="color: rgba(255, 255, 255, 0.35); text-decoration: none; font-size: 12.5px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; transition: color 0.15s ease;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255, 255, 255, 0.35)'">
                    <i class="fa-solid fa-arrow-left"></i> Back to Homepage
                </a>
            </div>
        </div>
    </div>
</body>
</html>
