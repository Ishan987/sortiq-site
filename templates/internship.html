{% extends 'base.html' %}

{% block title %}Apply for Internship | Sortiq Solutions{% endblock %}

{% block content %}
<div style="background: var(--primary); color: var(--white); padding: 60px 10%; text-align: center;">
    <h1 style="font-size: 36px; font-weight: 700;">Apply for Internship</h1>
    <p style="color: #cbd5e1; margin-top: 10px;">Kickstart your professional IT career with industry specialists.</p>
</div>

<section class="section">
    <div style="max-width: 600px; margin: 0 auto; background: var(--bg-light); padding: 40px; border-radius: 8px;">
        <h2 class="section-title" style="font-size: 24px; margin-bottom: 20px;">Internship Application</h2>
        <span class="line"></span>
        <form action="/submit-fresher" method="POST" enctype="multipart/form-data">
            <div class="form-item">
                <input type="text" name="name" placeholder="Enter Your Name" required>
            </div>
            <div class="form-item">
                <input type="email" name="email" placeholder="Enter Your Email" required>
            </div>
            <div class="form-item">
                <input type="tel" name="phone" placeholder="Enter Your Phone Number" required>
            </div>
            <div class="form-item">
                <input type="text" name="subject" placeholder="Desired Role (e.g. Web Dev, UI/UX, SEO)" required>
            </div>
            <div class="form-item">
                <label style="display:block; font-size:12px; margin-bottom:5px; font-weight:bold;">Upload Resume/CV:</label>
                <input type="file" name="cv" accept=".pdf,.doc,.docx" required>
            </div>
            <div class="form-textarea" style="margin-bottom:20px;">
                <textarea name="message" rows="5" placeholder="Tell us why you want to join Sortiq Solutions..." required style="width:100%; padding:12px; border:1px solid #cbd5e1; border-radius:4px; outline:none;"></textarea>
            </div>
            <button type="submit" class="custom-btn">Submit Application</button>
        </form>
    </div>
</section>
{% endblock %}
